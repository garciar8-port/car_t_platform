services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bioflow
      POSTGRES_PASSWORD: bioflow
      POSTGRES_DB: bioflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bioflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://bioflow:bioflow@postgres:5432/bioflow
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      MLFLOW_TRACKING_URI: http://mlflow:5001
      MODEL_PATH: /app/training/results/ppo_phase4
    volumes:
      - ./training/results:/app/training/results:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: services/frontend/
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:8080"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://bioflow:bioflow@postgres:5432/bioflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5001
      --backend-store-uri postgresql://bioflow:bioflow@postgres:5432/bioflow
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.1
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning

volumes:
  pgdata:
  redisdata:
  mlflow_artifacts:
  grafana_data:
